<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSS Insights Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #1a1a1a;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        header {
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 24px;
            margin-bottom: 32px;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .nav-tabs {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 12px;
        }
        
        .nav-tab {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #999;
            cursor: pointer;
            padding-bottom: 12px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .nav-tab.active {
            color: #1a1a1a;
            border-bottom-color: #1a1a1a;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .insights-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .insights-table th {
            background: #f5f5f5;
            border: 1px solid #d0d0d0;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #666;
        }
        
        .insights-table td {
            border: 1px solid #e0e0e0;
            padding: 12px;
        }
        
        .insights-table tr:hover {
            background: #fafafa;
        }
        
        .severity-badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border: 1px solid;
            width: fit-content;
        }
        
        .severity-info {
            background-color: #f0f4ff;
            border-color: #3b82f6;
            color: #1e40af;
        }
        
        .severity-warning {
            background-color: #fffbeb;
            border-color: #f59e0b;
            color: #92400e;
        }
        
        .severity-critical {
            background-color: #fef2f2;
            border-color: #ef4444;
            color: #7f1d1d;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border: 1px solid;
            width: fit-content;
        }
        
        .status-open {
            background-color: #f0f4ff;
            border-color: #3b82f6;
            color: #1e40af;
        }
        
        .status-approved {
            background-color: #f0f8f0;
            border-color: #4a9d6f;
            color: #2d6a47;
        }
        
        .status-archived {
            background-color: #f5f5f5;
            border-color: #999;
            color: #666;
        }
        
        .action-buttons {
            display: flex;
            gap: 6px;
        }
        
        button {
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #d0d0d0;
            background: white;
            color: #1a1a1a;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #f5f5f5;
            border-color: #999;
        }
        
        button.approve {
            border-color: #4a9d6f;
            color: #2d6a47;
        }
        
        button.approve:hover {
            background: #f0f8f0;
        }
        
        button.override {
            border-color: #f59e0b;
            color: #92400e;
        }
        
        button.override:hover {
            background: #fffbeb;
        }
        
        button.archive {
            border-color: #999;
            color: #666;
        }
        
        button.archive:hover {
            background: #f5f5f5;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border: 1px solid #d0d0d0;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #666;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d0d0d0;
            font-family: inherit;
            font-size: 13px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #1a1a1a;
            background: #fafafa;
        }
        
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }
        
        button.primary {
            background: #1a1a1a;
            color: white;
            border-color: #1a1a1a;
            flex: 1;
        }
        
        button.primary:hover {
            background: #333;
            border-color: #333;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Decision Insights</h1>
            <div class="nav-tabs">
                <div class="nav-tab active" onclick="switchTab('open')">Open Insights</div>
                <div class="nav-tab" onclick="switchTab('all')">All Insights</div>
            </div>
        </header>
        
        <div class="section">
            <div id="openInsightsSection">
                <div class="section-title">Open Insights</div>
                <div style="overflow-x: auto;">
                    <table class="insights-table" id="openInsightsTable">
                        <thead>
                            <tr>
                                <th>Rule</th>
                                <th>Type</th>
                                <th>Severity</th>
                                <th>Message</th>
                                <th>Created</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="openInsightsBody">
                            <tr><td colspan="6" style="text-align: center; color: #999;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="actionModal">
        <div class="modal-content">
            <div class="modal-title" id="actionModalTitle">Action</div>
            <div class="form-group">
                <label>User ID</label>
                <input type="text" id="actionUserId" placeholder="your-user-id">
            </div>
            <div class="form-group">
                <label>Reason</label>
                <textarea id="actionReason" placeholder="Why are you taking this action?" rows="3"></textarea>
            </div>
            <div id="overrideDataGroup" class="form-group" style="display: none;">
                <label>Override Data (JSON)</label>
                <textarea id="overrideData" placeholder='{"field": "value"}' rows="3"></textarea>
            </div>
            <div class="button-group">
                <button class="primary" onclick="submitAction()">Submit</button>
                <button onclick="closeActionModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api';
        let currentActionInsightId = null;
        let currentActionType = null;
        
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'open') {
                loadOpenInsights();
            } else {
                loadAllInsights();
            }
        }
        
        async function loadOpenInsights() {
            try {
                const response = await fetch(`${API_BASE}/insights`);
                const insights = await response.json();
                renderInsights(insights, 'openInsightsBody');
            } catch (error) {
                console.error('Failed to load insights:', error);
                document.getElementById('openInsightsBody').innerHTML = 
                    '<tr><td colspan="6" style="text-align: center; color: #999;">Error loading insights</td></tr>';
            }
        }
        
        async function loadAllInsights() {
            try {
                const response = await fetch(`${API_BASE}/insights`);
                const insights = await response.json();
                renderInsights(insights, 'openInsightsBody');
            } catch (error) {
                console.error('Failed to load insights:', error);
            }
        }
        
        function renderInsights(insights, containerId) {
            const tbody = document.getElementById(containerId);
            
            if (insights.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">No insights</td></tr>';
                return;
            }
            
            tbody.innerHTML = insights.map(insight => `
                <tr>
                    <td>${insight.ruleName}</td>
                    <td>${insight.insightType}</td>
                    <td><span class="severity-badge severity-${insight.severity.toLowerCase()}">${insight.severity}</span></td>
                    <td>${insight.message}</td>
                    <td>${new Date(insight.createdAt).toLocaleString()}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="approve" onclick="openActionModal(${insight.id}, 'approve')">Approve</button>
                            <button class="override" onclick="openActionModal(${insight.id}, 'override')">Override</button>
                            <button class="archive" onclick="openActionModal(${insight.id}, 'archive')">Archive</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        function openActionModal(insightId, actionType) {
            currentActionInsightId = insightId;
            currentActionType = actionType;
            
            const titleMap = {
                'approve': 'Approve Insight',
                'override': 'Override Insight',
                'archive': 'Archive Insight'
            };
            
            document.getElementById('actionModalTitle').textContent = titleMap[actionType];
            document.getElementById('overrideDataGroup').style.display = 
                actionType === 'override' ? 'block' : 'none';
            document.getElementById('actionModal').classList.add('active');
        }
        
        function closeActionModal() {
            document.getElementById('actionModal').classList.remove('active');
            document.getElementById('actionUserId').value = '';
            document.getElementById('actionReason').value = '';
            document.getElementById('overrideData').value = '';
            currentActionInsightId = null;
            currentActionType = null;
        }
        
        async function submitAction() {
            const userId = document.getElementById('actionUserId').value;
            const reason = document.getElementById('actionReason').value;
            
            if (!userId || !reason) {
                alert('Please fill in all required fields');
                return;
            }
            
            const endpoint = `${API_BASE}/insights/${currentActionInsightId}/${currentActionType}`;
            const body = {
                userId,
                reason,
                overrideData: currentActionType === 'override' ? 
                    document.getElementById('overrideData').value : null
            };
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                if (response.ok) {
                    closeActionModal();
                    loadOpenInsights();
                } else {
                    alert('Action failed');
                }
            } catch (error) {
                console.error('Action failed:', error);
                alert('Error performing action');
            }
        }
        
        loadOpenInsights();
        setInterval(loadOpenInsights, 5000);
    </script>
</body>
</html>
