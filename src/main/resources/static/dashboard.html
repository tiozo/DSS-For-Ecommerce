<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSS Admin Core</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        header { border-bottom: 1px solid #e0e0e0; padding-bottom: 16px; margin-bottom: 32px; }
        h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.3px; }
        
        .section { background: white; border: 1px solid #d0d0d0; padding: 20px; margin-bottom: 24px; }
        .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #666; margin-bottom: 16px; }
        
        .upload-grid { display: grid; grid-template-columns: 120px 1fr auto auto; gap: 12px; align-items: center; margin-bottom: 12px; }
        .upload-label { font-size: 12px; font-weight: 600; text-transform: uppercase; }
        input[type="file"] { font-size: 12px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border: 1px solid #d0d0d0; padding: 16px; }
        .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #666; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .badge { display: inline-block; padding: 4px 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; background: #2d6a47; color: white; margin-top: 8px; }
        
        button { padding: 8px 16px; font-size: 11px; font-weight: 600; border: 1px solid #1a1a1a; background: #1a1a1a; color: white; cursor: pointer; text-transform: uppercase; letter-spacing: 0.3px; }
        button:hover { background: #333; }
        .status { padding: 4px 8px; font-size: 11px; font-weight: 600; border: 1px solid #4a9d6f; background: #f0f8f0; color: #2d6a47; }
        
        .insights-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .insights-table th { background: #f5f5f5; border: 1px solid #d0d0d0; padding: 10px; text-align: left; font-weight: 600; text-transform: uppercase; font-size: 10px; color: #666; }
        .insights-table td { border: 1px solid #e0e0e0; padding: 10px; }
        .insights-table tr:hover { background: #fafafa; }
        .severity { padding: 2px 6px; font-size: 9px; font-weight: 600; text-transform: uppercase; border: 1px solid; }
        .severity-WARNING { background: #fffbeb; border-color: #f59e0b; color: #92400e; }
        .severity-CRITICAL { background: #fef2f2; border-color: #ef4444; color: #7f1d1d; }
        .severity-INFO { background: #f0f4ff; border-color: #3b82f6; color: #1e40af; }
        
        details { margin-top: 24px; }
        summary { font-size: 12px; font-weight: 600; text-transform: uppercase; cursor: pointer; padding: 12px; background: white; border: 1px solid #d0d0d0; }
        summary:hover { background: #f5f5f5; }
        .charts-container { padding: 20px; background: white; border: 1px solid #d0d0d0; border-top: none; }
        .chart-box { margin-bottom: 24px; }
        .chart-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #666; margin-bottom: 12px; }
        canvas { max-height: 250px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DSS Admin Core</h1>
        </header>
        
        <!-- Section 1: Data Management -->
        <div class="section">
            <div class="section-title">Data Management</div>
            <div class="upload-grid">
                <div class="upload-label">Sales Data</div>
                <input type="file" id="salesFile" accept=".csv">
                <button onclick="uploadSales()">Upload</button>
                <span id="salesStatus"></span>
            </div>
            <div class="upload-grid">
                <div class="upload-label">Rules</div>
                <input type="file" id="rulesFile" accept=".csv">
                <button onclick="uploadRules()">Upload</button>
                <span id="rulesStatus"></span>
            </div>
        </div>
        
        <!-- Section 2: Quick Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Sales</div>
                <div class="stat-value" id="totalRecords">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Rules</div>
                <div class="stat-value" id="activeRules">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Insights</div>
                <div class="stat-value" id="insightCount">0</div>
                <span id="insightBadge" class="badge" style="display:none;">Active</span>
            </div>
        </div>
        
        <!-- Section 3: Insights List -->
        <div id="insightsSection" class="section" style="display:none;">
            <div class="section-title">Triggered Insights</div>
            <table class="insights-table">
                <thead>
                    <tr>
                        <th>Rule</th>
                        <th>Type</th>
                        <th>Severity</th>
                        <th>Message</th>
                        <th>Created</th>
                    </tr>
                </thead>
                <tbody id="insightsBody">
                </tbody>
            </table>
        </div>
        
        <!-- Section 4: Analytics (Collapsible) -->
        <details>
            <summary>+ View Advanced Analytics</summary>
            <div class="charts-container">
                <div class="chart-box">
                    <div class="chart-title">Sales Over Time (Monthly)</div>
                    <canvas id="salesTimeChart"></canvas>
                </div>
                <div class="chart-box">
                    <div class="chart-title">Sales by Product Line</div>
                    <canvas id="salesProductChart"></canvas>
                </div>
                <div class="chart-box">
                    <div class="chart-title">Order Status Distribution</div>
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </details>
    </div>
    
    <script>
        let charts = {};
        let chartsRendered = false;
        
        async function uploadSales() {
            const file = document.getElementById('salesFile').files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const res = await fetch('/api/admin/upload-sales', { method: 'POST', body: formData });
                const data = await res.json();
                document.getElementById('salesStatus').innerHTML = `<span class="status">${data.recordsProcessed} records, ${data.insightsGenerated} insights</span>`;
                loadDashboard();
            } catch (e) {
                document.getElementById('salesStatus').textContent = 'Error';
            }
        }
        
        async function uploadRules() {
            const file = document.getElementById('rulesFile').files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const res = await fetch('/api/admin/upload-rules', { method: 'POST', body: formData });
                const data = await res.json();
                document.getElementById('rulesStatus').innerHTML = `<span class="status">${data.rulesProcessed} rules, ${data.insightsGenerated} insights</span>`;
                loadDashboard();
            } catch (e) {
                document.getElementById('rulesStatus').textContent = 'Error';
            }
        }
        
        async function loadDashboard() {
            try {
                const res = await fetch('/api/admin/dashboard-stats');
                const data = await res.json();
                
                document.getElementById('totalRecords').textContent = data.totalRecords;
                document.getElementById('activeRules').textContent = data.insights ? data.insights.length : 0;
                document.getElementById('insightCount').textContent = data.insightCount;
                
                if (data.hasInsights) {
                    document.getElementById('insightBadge').style.display = 'inline-block';
                    document.getElementById('insightsSection').style.display = 'block';
                    renderInsights(data.insights);
                }
                
                // Store data for lazy chart rendering
                window.chartData = data;
            } catch (e) {
                console.error('Failed to load dashboard:', e);
            }
        }
        
        function renderInsights(insights) {
            const tbody = document.getElementById('insightsBody');
            tbody.innerHTML = insights.map(i => `
                <tr>
                    <td>${i.ruleName}</td>
                    <td>${i.insightType}</td>
                    <td><span class="severity severity-${i.severity}">${i.severity}</span></td>
                    <td>${i.message}</td>
                    <td>${new Date(i.createdAt).toLocaleString()}</td>
                </tr>
            `).join('');
        }
        
        // Lazy load charts when details is opened
        document.querySelector('details').addEventListener('toggle', function(e) {
            if (e.target.open && !chartsRendered && window.chartData) {
                renderCharts(window.chartData);
                chartsRendered = true;
            }
        });
        
        function renderCharts(data) {
            const timeLabels = data.salesByMonth.map(d => d.label);
            const timeValues = data.salesByMonth.map(d => d.value);
            
            charts.time = new Chart(document.getElementById('salesTimeChart'), {
                type: 'line',
                data: {
                    labels: timeLabels,
                    datasets: [{
                        label: 'Sales',
                        data: timeValues,
                        borderColor: '#1a1a1a',
                        backgroundColor: 'transparent',
                        borderWidth: 2,
                        tension: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
            });
            
            const productLabels = data.salesByProductLine.map(d => d.label);
            const productValues = data.salesByProductLine.map(d => d.value);
            
            charts.product = new Chart(document.getElementById('salesProductChart'), {
                type: 'bar',
                data: {
                    labels: productLabels,
                    datasets: [{
                        label: 'Sales',
                        data: productValues,
                        backgroundColor: '#1a1a1a',
                        borderColor: '#1a1a1a',
                        borderWidth: 1
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
            });
            
            const statusLabels = data.statusDistribution.map(d => d.label);
            const statusValues = data.statusDistribution.map(d => d.value);
            
            charts.status = new Chart(document.getElementById('statusChart'), {
                type: 'pie',
                data: {
                    labels: statusLabels,
                    datasets: [{
                        data: statusValues,
                        backgroundColor: ['#1a1a1a', '#666', '#999', '#ccc'],
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }
        
        loadDashboard();
    </script>
</body>
</html>
