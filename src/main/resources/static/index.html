<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSS Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #1a1a1a;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        header {
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 24px;
            margin-bottom: 32px;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .card {
            background: white;
            border: 1px solid #d0d0d0;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .card-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .card-value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        
        .card-meta {
            font-size: 12px;
            color: #999;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border: 1px solid;
            width: fit-content;
        }
        
        .status-valid {
            background-color: #f0f8f0;
            border-color: #4a9d6f;
            color: #2d6a47;
        }
        
        .status-warning {
            background-color: #fff8f0;
            border-color: #d97706;
            color: #92400e;
        }
        
        .status-error {
            background-color: #fef2f2;
            border-color: #dc2626;
            color: #7f1d1d;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sources-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .source-item {
            background: white;
            border: 1px solid #d0d0d0;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 16px;
        }
        
        .source-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .source-id {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .button-group {
            display: flex;
            gap: 8px;
        }
        
        button {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #d0d0d0;
            background: white;
            color: #1a1a1a;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #f5f5f5;
            border-color: #999;
        }
        
        button.primary {
            background: #1a1a1a;
            color: white;
            border-color: #1a1a1a;
        }
        
        button.primary:hover {
            background: #333;
            border-color: #333;
        }
        
        button.insights {
            background: #2d6a47;
            color: white;
            border-color: #2d6a47;
        }
        
        button.insights:hover {
            background: #1f4a2f;
            border-color: #1f4a2f;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #666;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d0d0d0;
            font-family: inherit;
            font-size: 13px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #1a1a1a;
            background: #fafafa;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border: 1px solid #d0d0d0;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .data-table th {
            background: #f5f5f5;
            border: 1px solid #d0d0d0;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #666;
        }
        
        .data-table td {
            border: 1px solid #e0e0e0;
            padding: 12px;
        }
        
        .data-table tr:hover {
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Decision Support System</h1>
        </header>
        
        <div class="grid">
            <div class="card">
                <div class="card-title">Total Records</div>
                <div class="card-value" id="totalRecords">0</div>
                <div class="card-meta">Processed data points</div>
            </div>
            <div class="card">
                <div class="card-title">Active Sources</div>
                <div class="card-value" id="activeSources">0</div>
                <div class="card-meta">Connected data sources</div>
            </div>
            <div class="card">
                <div class="card-title">Last Update</div>
                <div class="card-value" id="lastUpdate">--:--</div>
                <div class="card-meta">System time</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Data Sources</div>
            <div class="sources-list" id="sourcesList"></div>
            <div style="margin-top: 16px; display: flex; gap: 8px;">
                <button class="primary" onclick="openCsvModal()">Upload CSV</button>
                <button class="primary" onclick="openApiModal()">Configure API</button>
                <button onclick="processAll()">Process All</button>
                <button id="insightsBtn" class="insights" onclick="goToInsights()">View Insights</button>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Processed Data</div>
            <div style="overflow-x: auto;">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>Source ID</th>
                            <th>Record ID</th>
                            <th>Timestamp</th>
                            <th>Status</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody">
                        <tr><td colspan="5" style="text-align: center; color: #999;">No data</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="modal" id="csvModal">
        <div class="modal-content">
            <div class="modal-title">Upload CSV</div>
            <div class="form-group">
                <label>Select File</label>
                <input type="file" id="csvFile" accept=".csv">
            </div>
            <div class="button-group">
                <button class="primary" onclick="uploadCsv()">Upload</button>
                <button onclick="closeCsvModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="apiModal">
        <div class="modal-content">
            <div class="modal-title">Configure API</div>
            <div class="form-group">
                <label>API Endpoint</label>
                <input type="text" id="apiEndpoint" placeholder="https://api.example.com/data">
            </div>
            <div class="form-group">
                <label>Method</label>
                <input type="text" id="apiMethod" placeholder="GET" value="GET">
            </div>
            <div class="button-group">
                <button class="primary" onclick="configureApi()">Configure</button>
                <button onclick="closeApiModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api';
        
        function openCsvModal() {
            document.getElementById('csvModal').classList.add('active');
        }
        
        function closeCsvModal() {
            document.getElementById('csvModal').classList.remove('active');
            document.getElementById('csvFile').value = '';
        }
        
        function openApiModal() {
            document.getElementById('apiModal').classList.add('active');
        }
        
        function closeApiModal() {
            document.getElementById('apiModal').classList.remove('active');
        }
        
        async function uploadCsv() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                await fetch(`${API_BASE}/upload-csv`, {
                    method: 'POST',
                    body: formData
                });
                closeCsvModal();
                refreshDashboard();
            } catch (error) {
                console.error('Upload failed:', error);
            }
        }
        
        async function configureApi() {
            const endpoint = document.getElementById('apiEndpoint').value;
            const method = document.getElementById('apiMethod').value;
            
            if (!endpoint) return;
            
            try {
                await fetch(`${API_BASE}/configure-api`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ endpoint, method })
                });
                closeApiModal();
                refreshDashboard();
            } catch (error) {
                console.error('Configuration failed:', error);
            }
        }
        
        async function processAll() {
            try {
                await fetch(`${API_BASE}/process-all`, {
                    method: 'POST'
                });
                refreshDashboard();
            } catch (error) {
                console.error('Processing failed:', error);
            }
        }
        
        function goToInsights() {
            window.location.href = '/insights.html';
        }
        
        async function refreshDashboard() {
            try {
                const headers = { 'X-Tenant-ID': 'default-tenant' };
                
                const dashResponse = await fetch(`${API_BASE}/dashboard`, { headers });
                const dashboard = await dashResponse.json();
                
                const dataResponse = await fetch(`${API_BASE}/data`, { headers });
                const data = await dataResponse.json();
                
                console.log('Data fetched:', data);
                updateDashboard(dashboard, data);
                
                const insightsBtn = document.getElementById('insightsBtn');
                insightsBtn.style.display = data.length > 0 ? 'block' : 'none';

            } catch (error) {
                console.error('Refresh failed:', error);
            }
        }
        
        function updateDashboard(dashboard, data) {
            document.getElementById('totalRecords').textContent = data.length;
            document.getElementById('activeSources').textContent = dashboard.sources ? Object.keys(dashboard.sources).length : 0;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
            
            updateSourcesList(dashboard.sources);
            updateDataTable(data);
        }
        
        function updateSourcesList(sources) {
            const list = document.getElementById('sourcesList');
            list.innerHTML = '';
            
            if (!sources || Object.keys(sources).length === 0) {
                list.innerHTML = '<div style="color: #999; padding: 16px;">No sources configured</div>';
                return;
            }
            
            Object.entries(sources).forEach(([id, source]) => {
                const statusClass = source.valid ? 'status-valid' : 'status-error';
                const statusText = source.valid ? 'Valid' : 'Invalid';
                
                const item = document.createElement('div');
                item.className = 'source-item';
                item.innerHTML = `
                    <div>
                        <div class="source-name">${source.name}</div>
                        <div class="source-id">${id}</div>
                    </div>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                `;
                list.appendChild(item);
            });
        }
        
        function updateDataTable(data) {
            const tbody = document.getElementById('dataTableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">No data</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.slice(0, 10).map(record => `
                <tr>
                    <td>${record.sourceId}</td>
                    <td>${record.recordId}</td>
                    <td>${new Date(record.timestamp).toLocaleString()}</td>
                    <td><span class="status-badge status-${record.status}">${record.status}</span></td>
                    <td><code style="font-size: 11px;">${JSON.stringify(record.data).substring(0, 50)}...</code></td>
                </tr>
            `).join('');
        }
        
        refreshDashboard();
        setInterval(refreshDashboard, 5000);
    </script>
</body>
</html>
